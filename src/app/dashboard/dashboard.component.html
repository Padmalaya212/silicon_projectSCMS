<div class="page-header">
  <h1 class="display-font">Overview</h1>
  <p class="page-subtitle">Real-time snapshot of your student register</p>
</div>

<div class="kpi-grid" *ngIf="!loading">
  <div class="kpi-card">
    <div class="kpi-icon" style="background: var(--primary-light); color: var(--primary);">
      <mat-icon>groups</mat-icon>
    </div><br><br>
    <span class="kpi-value display-font">{{ stats.totalStudents }}</span><br><br>
    <span class="kpi-label" style="background: var(--primary-light); color: var(--primary);">Total Students</span>
  </div>

  <div class="kpi-card">
    <div class="kpi-icon" style="background: var(--teal-light); color: var(--teal);">
      <mat-icon>menu_book</mat-icon>
    </div><br><br>
    <span class="kpi-value display-font">{{ stats.totalCourses }}</span><br><br>
    <span class="kpi-label" style="background: var(--teal-light); color: var(--teal);">Total Courses</span>
  </div>

  <div class="kpi-card">
    <div class="kpi-icon" style="background: var(--green-light); color: var(--green);">
      <mat-icon>male</mat-icon>
    </div><br><br>
    <span class="kpi-value display-font">{{ stats.totalMale }}</span><br><br>
    <span class="kpi-label" style="background: var(--green-light); color: var(--green);">Male Students</span>
  </div>

  <div class="kpi-card">
    <div class="kpi-icon" style="background: var(--rose-light); color: var(--rose);">
      <mat-icon>female</mat-icon>
    </div><br><br>
    <span class="kpi-value display-font">{{ stats.totalFemale }}</span><br><br>
    <span class="kpi-label" style="background: var(--rose-light); color: var(--rose);">Female Students</span>
  </div>
</div>

<div class="loading-container" *ngIf="loading">
  <mat-spinner></mat-spinner>
</div>
